apis:
  - aid: certero:certerox-itam
    name: CerteroX ITAM
    description: >-
      CerteroX ITAM is Certero's IT asset management module that discovers,
      inventories, and tracks hardware assets, network devices, and end-user
      computing across on-premises, cloud, and remote environments,
      providing the lifecycle and CMDB foundation for the rest of the
      CerteroX suite.
    humanURL: https://www.certero.com/products/itam/
    tags:
      - Asset Discovery
      - CMDB
      - Hardware
      - ITAM
      - Lifecycle
    properties:
      - type: Documentation
        url: https://www.certero.com/products/itam/
  - aid: certero:certerox-sam
    name: CerteroX SAM
    description: >-
      CerteroX SAM (Software Asset Management) provides license entitlement
      management, software usage analytics, compliance reporting, and
      optimization for multi-vendor estates. The module is delivered alongside
      publisher-specialised editions for IBM, Microsoft, Oracle, SAP, and
      Salesforce that apply vendor-specific licensing rules.
    humanURL: https://www.certero.com/products/sam/
    tags:
      - Compliance
      - License Optimization
      - SAM
      - Software Asset Management
    properties:
      - type: Documentation
        url: https://www.certero.com/products/sam/
  - aid: certero:certerox-saas
    name: CerteroX SaaS
    description: >-
      CerteroX SaaS is the SaaS management module that discovers sanctioned
      and shadow SaaS subscriptions, monitors usage, governs renewals, and
      identifies cost-saving opportunities across the enterprise SaaS
      portfolio.
    humanURL: https://www.certero.com/products/saas-management/
    tags:
      - SaaS Management
      - Shadow IT
      - Subscriptions
    properties:
      - type: Documentation
        url: https://www.certero.com/products/saas-management/
  - aid: certero:certerox-cloud
    name: CerteroX Cloud
    description: >-
      CerteroX Cloud delivers FinOps cost optimization, usage observability,
      and governance across AWS, Microsoft Azure, and Google Cloud, helping
      enterprises rightsize, forecast, and chargeback cloud spend.
    humanURL: https://www.certero.com/products/cloud-management/
    tags:
      - Cloud Cost
      - FinOps
      - Multi-Cloud
    properties:
      - type: Documentation
        url: https://www.certero.com/products/cloud-management/
  - aid: certero:certerox-command-center
    name: CerteroX Command Center / AI
    description: >-
      CerteroX Command Center / AI is the federated reporting and analytics
      surface that aggregates data from the ITAM, SAM, SaaS, and Cloud
      modules into a single pane of glass with AI-driven insights and
      recommendations.
    humanURL: https://www.certero.com/products/command-center/
    tags:
      - AI
      - Analytics
      - Dashboard
      - Reporting
    properties:
      - type: Documentation
        url: https://www.certero.com/products/command-center/
  - aid: certero:certero-servicenow-integration
    name: Certero ServiceNow Integration
    description: >-
      Certero offers a certified ServiceNow integration that synchronises
      hardware, software, and license data from CerteroX into the ServiceNow
      CMDB and SAM Pro modules, enabling unified workflows for IT service
      management and software compliance.
    humanURL: https://store.servicenow.com/
    tags:
      - CMDB
      - Connector
      - ITSM
      - ServiceNow
    properties:
      - type: Marketplace
        url: https://store.servicenow.com/
